services:
  database:
    image: postgres:18.3-alpine
    environment:
      POSTGRES_USER: caixukun
      POSTGRES_PASSWORD: Jinitaimei1234
      POSTGRES_DB: XiaoHeiZi
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caixukun -d XiaoHeiZi"]
      interval: 20s
      timeout: 5s
      retries: 5

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "9178:9178"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "6767:6767"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:6767/', timeout=3)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    develop:
      watch: 
        - action: sync
          path: "./backend"
          target: "/app"
          ignore:
            - "**/__pycache__/**"
            - "**/venv/**"
            - "*.pyc"
            - "*.pyd"
        - action: rebuild
          path: "./backend/requirements.txt"

volumes:
  db_data:
